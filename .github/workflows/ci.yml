name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[dev]"
      - name: Ruff lint
        run: ruff check src/ tests/
      - name: Ruff format
        run: ruff format --check src/ tests/
      - name: Pyright
        run: pyright
      - name: Daemon route ↔ DaemonClient drift check
        run: python scripts/generate_client.py --check
      - name: SKILL command reference is in sync with OpenAPI spec
        run: python scripts/generate_skill.py --check
      - name: CLI / MCP / daemon surface count consistency
        run: python scripts/check_surface_count.py

  unit-tests:
    name: Unit Tests / Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: pip install -e ".[dev]"
      - name: Run unit tests
        run: pytest tests/unit/ -v --tb=short

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [quality, unit-tests]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[dev]"
      - name: Install Playwright browsers
        run: python -m playwright install --with-deps chromium
      - name: Run integration tests
        run: pytest tests/integration/ -v --tb=short
        env:
          AGENTCLOAK_TEST_HEADED: "0"

  build:
    name: Build Verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install build
      - name: Build sdist + wheel
        run: python -m build
      - name: Verify install from wheel
        run: pip install dist/*.whl && agentcloak --help

  security:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install pip-audit
      - run: pip install -e .
      - name: Audit dependencies
        run: pip-audit
