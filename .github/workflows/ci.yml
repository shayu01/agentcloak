name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Preflight Quality Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: uv sync --extra dev
      # ``ruff format --check`` isn't wrapped by preflight (style-only,
      # rarely fires) so we keep it as a discrete step for fast feedback.
      - name: Ruff format
        run: uv run ruff format --check src/ tests/
      # Preflight wraps lint, pyright, surface-count, client drift, SKILL
      # sync, config-docs sync, version consistency, and the typer-group
      # smoke test in one shot. ``--skip tests`` lets the matrix job below
      # own pytest so we don't pay for it twice in CI.
      - name: Preflight (lint + types + drift + config + version + smoke)
        run: uv run python scripts/preflight.py --skip tests

  unit-tests:
    name: Unit Tests / Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: uv sync --extra dev
      - name: Run unit tests
        run: uv run pytest tests/unit/ -v --tb=short

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [quality, unit-tests]
    timeout-minutes: 5
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: uv sync --extra dev
      - name: Install Playwright browsers
        run: uv run python -m playwright install --with-deps chromium
      - name: Run integration tests
        run: uv run pytest tests/integration/ -v --tb=short --timeout=60
        env:
          AGENTCLOAK_TEST_HEADED: "0"

  build:
    name: Build Verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install build
      - name: Build sdist + wheel
        run: python -m build
      - name: Verify install from wheel
        run: pip install dist/*.whl && agentcloak --help

  security:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install pip-audit
      - run: pip install -e .
      - name: Audit dependencies
        run: pip-audit
